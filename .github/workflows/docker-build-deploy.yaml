name: Shared Build and Deploy

on:
    workflow_call:
        inputs:
            image_name:
                description: "Override the image name (defaults to repo name)"
                required: false
                type: string
            argo_app_name:
                description: "The name of the Application in ArgoCD (defaults to repo name)"
                required: false
                type: string
            deployment_name:
                description: "The specific K8s deployment to restart (defaults to repo name)"
                required: false
                type: string
            target_namespace:
                description: "Target K8s namespace"
                required: false
                default: "default"
                type: string
            build_context:
                description: "Docker build context"
                required: false
                default: "."
                type: string
            dockerfile_path:
                description: "Path to the Dockerfile"
                required: false
                default: "./Dockerfile"
                type: string
        secrets:
            GHCR_PAT: { required: false }
            ARGOCD_TOKEN: { required: false }
            ARGOCD_SERVER: { required: false }

jobs:
    check-secrets:
        runs-on: ubuntu-latest
        outputs:
            has_argo_secrets: ${{ steps.check.outputs.has_argo_secrets }}
        steps:
            - id: check
              shell: bash
              run: |
                  if [ -n "${{ secrets.ARGOCD_TOKEN }}" ] && [ -n "${{ secrets.ARGOCD_SERVER }}" ]; then
                    echo "has_argo_secrets=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_argo_secrets=false" >> $GITHUB_OUTPUT
                  fi

    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Calculate Variables
              id: vars
              run: |
                  REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
                  REPO_NAME_LOWER=$(echo "${{ github.repository }}" | cut -d '/' -f 2 | tr '[:upper:]' '[:lower:]')

                  # Use custom image name if provided, otherwise default to repo name
                  if [ -n "${{ inputs.image_name }}" ]; then
                    IMAGE_NAME=$(echo "${{ inputs.image_name }}" | tr '[:upper:]' '[:lower:]')
                  else
                    IMAGE_NAME=$REPO_NAME_LOWER
                  fi

                  echo "IMAGE_URL=ghcr.io/$REPO_OWNER_LOWER/$IMAGE_NAME" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GHCR_PAT }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: ${{ inputs.build_context }}
                  file: ${{ inputs.dockerfile_path }}
                  push: true
                  tags: |
                      ${{ env.IMAGE_URL }}:${{ github.sha }}
                      ${{ env.IMAGE_URL }}:latest

    deploy:
        needs: [build, check-secrets]
        if: needs.check-secrets.outputs.has_argo_secrets == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Trigger ArgoCD Deployment
              env:
                  ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
                  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
              run: |
                  set -euo pipefail

                    # Fallback Logic: Input > Repo Name
                    # We convert to lowercase immediately to ensure API compatibility
                    REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

                    RAW_APP="${{ inputs.argo_app_name }}"
                    APP=${RAW_APP:-$REPO_NAME}

                    RAW_DEP="${{ inputs.deployment_name }}"
                    DEP=${RAW_DEP:-$REPO_NAME}

                    NS="${{ inputs.target_namespace }}"

                    echo "Targeting Argo App: $APP"
                    echo "Restarting Deployment: $DEP"

                    argo_api_post() {
                      local url="$1"
                      local payload="$2"
                      local action_name="$3"
                      local max_retries="${4:-3}"
                      local retry_count=0
                      local wait_time=2

                      local body_file
                      local header_file
                      local http_code
                      local content_type
                      local error_code

                      while [[ $retry_count -lt $max_retries ]]; do
                        body_file=$(mktemp)
                        header_file=$(mktemp)

                        if ! http_code=$(curl --silent --show-error --output "$body_file" --dump-header "$header_file" --write-out "%{http_code}" --request POST "$url" \
                          -H "Authorization: Bearer $ARGOCD_TOKEN" \
                          -H "Content-Type: application/json" \
                          -d "$payload"); then
                          echo "ArgoCD API call failed during: $action_name"
                          rm -f "$body_file" "$header_file"
                          exit 1
                        fi

                        content_type=$(awk -F': *' 'tolower($1)=="content-type" {print tolower($2)}' "$header_file" | tr -d '\r' | tail -n 1)

                        echo "ArgoCD API status ($action_name): $http_code"

                        if [[ "$http_code" =~ ^2 ]]; then
                          echo "Response ($action_name):"
                          sed -n '1,40p' "$body_file"
                          rm -f "$body_file" "$header_file"
                          return 0
                        fi

                        # Check if this is a retryable error (operation in progress)
                        error_code=$(grep -o '"code":[0-9]*' "$body_file" 2>/dev/null | grep -o '[0-9]*$' || echo "")
                        if [[ "$error_code" == "9" ]] && [[ $retry_count -lt $((max_retries - 1)) ]]; then
                          echo "Operation already in progress (code 9). Retrying in ${wait_time}s (attempt $((retry_count + 1))/$max_retries)..."
                          rm -f "$body_file" "$header_file"
                          sleep "$wait_time"
                          wait_time=$((wait_time * 2))
                          retry_count=$((retry_count + 1))
                          continue
                        fi

                        # Non-retryable error
                        echo "ArgoCD API returned non-success status during: $action_name"
                        echo "Response body:"
                        sed -n '1,80p' "$body_file"

                        if [[ -n "$content_type" && "$content_type" != *"json"* ]]; then
                          echo "Unexpected content type: $content_type"
                        fi

                        if grep -qi '<html' "$body_file"; then
                          echo "Received HTML response - likely redirect/auth/proxy issue"
                        fi

                        rm -f "$body_file" "$header_file"
                        exit 1
                      done

                      echo "Max retries ($max_retries) exceeded for: $action_name"
                      exit 1
                    }

                    # Force restart of the specific component
                    argo_api_post \
                      "https://${ARGOCD_SERVER}/api/v1/applications/${APP}/resource/actions?namespace=${NS}&resourceName=${DEP}&version=v1&kind=Deployment&group=apps" \
                      '"restart"' \
                      "restart deployment"

                    # Wait for restart operation to complete before syncing
                    echo "Waiting 3 seconds for restart operation to settle..."
                    sleep 3

                    # Sync ONLY the specific resource (with retries for in-progress operations)
                    argo_api_post \
                      "https://${ARGOCD_SERVER}/api/v1/applications/${APP}/sync" \
                      "{\"resources\": [{\"group\": \"apps\", \"kind\": \"Deployment\", \"name\": \"$DEP\", \"namespace\": \"$NS\"}]}" \
                      "sync deployment" \
                      5
